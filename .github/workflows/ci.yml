name: ci

on:
  push:
    branches: ['**']
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  smoke:
    name: docker build + smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: build smoke image
        run: docker build -t fcc-smoke .

      - name: smoke test /health
        run: |
          # /health is unauthenticated — returns {"status":"healthy"} with no key.
          # DEEPSEEK_API_KEY=dummy is accepted at startup (provider errors surface
          # on first real request, not at init time).
          docker run -d --rm -p 8082:8082 \
            -e DEEPSEEK_API_KEY=dummy \
            --name fcc-smoke-run fcc-smoke
          sleep 10
          curl -fsS http://127.0.0.1:8082/health

  publish:
    name: build + push image
    needs: smoke
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
